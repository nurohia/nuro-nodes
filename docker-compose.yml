services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/nodes.json:/app/nodes.json
      - ./backend/redeem_codes.json:/app/redeem_codes.json
    restart: unless-stopped
    ports:
      - "127.0.0.1:38081:38081"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ""
        VITE_ADMIN_PATH_KEY: ${VITE_ADMIN_PATH_KEY:-nuro-admin}
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "38173:80"
